<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionOS</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  font-size: 28px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  width: 100%;
  font-weight: bold;
}

#resultado {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 8px;
  white-space: pre-line;
}
</style>

</head>

<body>

<h1>🧠 DecisionOS</h1>
<p>Tu motor de decisiones inteligente</p>

<input id="pregunta" placeholder="Ej: ¿Debería renunciar a mi trabajo?" />

<button onclick="analizar()">Analizar decisión</button>

<div id="resultado"></div>

<script>
window.analizar = function () {
  const pregunta = document.getElementById("pregunta").value.toLowerCase();
  const resultado = document.getElementById("resultado");

  if (!pregunta) {
    alert("Escribe una decisión");
    return;
  }

  resultado.innerText = "Analizando...\n";

  let respuesta = "";

  if (pregunta.includes("renunciar") || pregunta.includes("trabajo")) {
    respuesta =
`⚠️ DECISIÓN: CAMBIO LABORAL

Riesgo: Alto  
Probabilidad de éxito: Media  

Recomendación:
No renuncies sin ingresos alternativos.
Primero valida estabilidad financiera.`;
  } 
  else if (pregunta.includes("negocio") || pregunta.includes("emprender")) {
    respuesta =
`🚀 DECISIÓN: EMPRENDER

Riesgo: Medio  
Potencial: Alto  

Recomendación:
Valida el mercado antes de invertir fuerte.
Empieza pequeño y escala.`;
  } 
  else if (pregunta.includes("dinero") || pregunta.includes("invertir")) {
    respuesta =
`💰 DECISIÓN: DINERO

Riesgo: Variable  

Recomendación:
Diversifica. No pongas todo en una sola opción.
Prioriza flujo antes que especulación.`;
  }
  else {
    respuesta =
`📊 ANÁLISIS GENERAL

Información insuficiente.

Recomendación:
Define mejor el contexto:
- Riesgo
- Tiempo
- Objetivo`;
  }

  resultado.innerText += respuesta;
};
</script>

</body>
</html>

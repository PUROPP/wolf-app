<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOLF IDENTITY</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  font-size: 28px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

ul {
  margin-top: 20px;
}

li {
  background: #1e293b;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>🐺 WOLF IDENTITY</h1>

<p>Construye tu versión futura</p>

<button onclick="login()">Login</button>

<input id="pensamiento" placeholder="Escribe quién quieres ser..." />

<button onclick="guardar()">Guardar identidad</button>

<h2>📡 Evolución</h2>
<h2>🔮 Tu futuro</h2>
<button onclick="futuro()">Ver mi evolución futura</button>
<p id="resultado"></p>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPVeljA3QfaI4JXt-1BQjZfPNphYfkhtE",
  authDomain: "wilfrido-app.firebaseapp.com",
  projectId: "wilfrido-app",
  storageBucket: "wilfrido-app.firebasestorage.app",
  messagingSenderId: "990867661134",
  appId: "1:990867661134:web:fc4061a213895564663e1f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = function () {
  signInAnonymously(auth)
    .then(() => alert("Login OK"))
    .catch(console.error);
};

// GUARDAR IDENTIDAD
window.guardar = async function () {
  const texto = document.getElementById("pensamiento").value;

  if (!texto) {
    alert("Escribe algo primero");
    return;
  }

  await addDoc(collection(db, "identidad"), {
    texto: texto,
    fecha: new Date().toISOString()
  });

  alert("Guardado 🚀");
};

// ANALIZAR FUTURO
window.futuro = async function () {
  const resultado = document.getElementById("resultado");
  resultado.innerText = "Analizando...";

  try {
    const querySnapshot = await getDocs(collection(db, "identidad"));

    let textos = [];

    querySnapshot.forEach(doc => {
      textos.push(doc.data().texto.toLowerCase());
    });

    let analisis = "";

    if (textos.length === 0) {
      analisis = "Aún no hay datos. Empieza a construir tu identidad.";
    }
    else if (textos.join(" ").includes("millonario")) {
      analisis = "Mentalidad de riqueza detectada. Alto potencial financiero si mantienes consistencia.";
    }
    else if (textos.length > 5) {
      analisis = "Disciplina detectada. Estás construyendo una identidad sólida.";
    }
    else {
      analisis = "Estás en fase inicial. Define mejor tu dirección.";
    }

    resultado.innerText = analisis;

  } catch (error) {
    console.error(error);
    resultado.innerText = "Error al analizar";
  }
};
</script>

</body>
</html>
